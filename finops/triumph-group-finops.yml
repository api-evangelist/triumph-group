principles:
  - name: Visibility
    description: No public consumption telemetry; visibility depends on whatever reporting clauses
      live inside the Triumph supplier / customer agreement.
  - name: Allocation
    description: Allocate any cost to the consuming aerospace program (engine, landing gear,
      actuation, etc.) using the contract identifier.
  - name: Optimization
    description: Optimization levers (volume, term length, multi-program bundling) are negotiated
      rather than self-serve.
  - name: Accountability
    description: Aerospace program owner manages the relationship; procurement handles renewals
      and contract amendments.
