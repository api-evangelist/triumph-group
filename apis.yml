description: >-
  Triumph Group designs, develops, manufactures, repairs, and overhauls a broad portfolio
  of aerospace structures, systems, and components for commercial and military aviation
  customers. A Fortune 1000 company headquartered in Berwyn, Pennsylvania, Triumph serves
  the full aircraft lifecycle across actuation products, geared solutions, interiors,
  systems, electronics, and controls. The company operates a developer portal and supplier
  portal for partners and customers.
